server {
  listen 80;
  server_name _;

  # NOTE: every backend controller is mapped under /api/v1/... (see
  # AuthController, SkillForgeController). The trailing /api/v1/ here is
  # what rewrites an incoming "/api/skillforge/auth/login" into
  # "/api/v1/skillforge/auth/login" on the way to the backend -- if this
  # ever gets "simplified" back to /api/ (matching the location prefix
  # verbatim, i.e. no rewrite at all), every single API call will 404
  # against the backend even though frontend/backend look otherwise
  # healthy in isolation.
  location /api/ {
    proxy_pass http://backend:8080/api/v1/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws/ {
    proxy_pass http://backend:8080/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://frontend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
