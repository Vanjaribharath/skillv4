# Production overlay for self-hosted / single-VM Docker deployments.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Overrides dev defaults with values that MUST come from the host
# environment (via a .env file next to this one, or exported shell vars).
# Nothing here has a hardcoded credential.
#
# NOTE: if you're deploying to Railway/Render with Neon, you don't need
# this file at all -- those platforms build backend/Dockerfile directly
# and inject DATABASE_URL/JWT_SECRET as platform env vars. This file is
# only for "docker compose up on a VM I manage myself" deployments.

services:
  postgres:
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-executionos}"
      POSTGRES_USER: "${POSTGRES_USER:-executionos}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env for production}"
    # Don't expose Postgres to the host network in production --
    # only the backend container needs to reach it, over the compose network.
    ports: []

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: "prod"
      DATABASE_URL: "${DATABASE_URL:-jdbc:postgresql://postgres:5432/${POSTGRES_DB:-executionos}}"
      DATABASE_USERNAME: "${POSTGRES_USER:-executionos}"
      DATABASE_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env for production}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env for production, e.g. output of openssl rand -hex 32}"
      CORS_ORIGINS: "${CORS_ORIGINS:?Set CORS_ORIGINS in .env for production}"
      FRONTEND_BASE_URL: "${FRONTEND_BASE_URL:?Set FRONTEND_BASE_URL in .env for production (used in candidate invitation email links)}"
      SWAGGER_USERNAME: "${SWAGGER_USERNAME:-admin}"
      SWAGGER_PASSWORD: "${SWAGGER_PASSWORD:?Set SWAGGER_PASSWORD in .env for production}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
    restart: unless-stopped

  frontend:
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-/api}"
      BACKEND_API_URL: "http://backend:8080/api/v1"
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
    restart: unless-stopped

  nginx:
    restart: unless-stopped

  grafana:
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env for production}"
