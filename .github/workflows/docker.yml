name: Docker

# Validates both Dockerfiles actually build. This is deliberately just a
# build check, not a full runtime/integration test — backend-ci.yml
# already does that (with a real Postgres service container). Trying to
# smoke-test the backend image here without a database would either
# need to spin up Postgres again (duplicating backend-ci.yml) or produce
# a shallow "did the JVM not immediately crash" check that's easy to
# mistake for real validation. Keeping this workflow to what it can
# honestly guarantee: the image builds.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            context: backend
          - name: frontend
            context: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: local/${{ matrix.name }}:test
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # Only push on version tags (v1.0.0, v1.2.3, ...) — never on every
      # push to main, to keep the registry from filling with noise.
      # Uses the automatic GITHUB_TOKEN — no extra secret to configure.
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push ${{ matrix.name }} image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-${{ matrix.name }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
