name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: executionos_test
          POSTGRES_USER: executionos
          POSTGRES_PASSWORD: executionos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/executionos_test
          DATABASE_USERNAME: executionos
          DATABASE_PASSWORD: executionos
          JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long
          CORS_ORIGINS: http://localhost:3000
          SPRING_PROFILES_ACTIVE: dev
        run: mvn -q -DskipTests=false verify

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/
