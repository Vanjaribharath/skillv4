name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Monday 06:00 UTC — catches newly-disclosed CVEs
    # in dependencies even when nobody pushes code that week.
    - cron: "0 6 * * 1"

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      matrix:
        language: ["java-kotlin", "javascript-typescript"]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      # For Java, CodeQL needs a real build to trace through the code.
      - uses: actions/setup-java@v4
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend for analysis
        if: matrix.language == 'java-kotlin'
        working-directory: backend
        run: mvn -q -DskipTests package

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Audit for high/critical vulnerabilities
        working-directory: frontend
        run: npm audit --audit-level=high
